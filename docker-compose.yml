version: '3.8'

services:
  app:
    build: .
    container_name: discord_webhook_delivery
    ports:
      - "24000:3000"
    env_file: .env
    networks:
      - infra-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  infra-network:
    external: true